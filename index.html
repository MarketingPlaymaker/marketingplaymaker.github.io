<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Básico -->
    <title>Playmaker | Agência de Marketing Esportivo - Transforme Sua Marca</title>

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marketingplaymaker.com.br/" />
    <meta property="og:title" content="Playmaker | Agência de Marketing Esportivo" />

    <meta property="og:site_name" content="Playmaker Marketing Esportivo" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon será adicionado dinamicamente pelo React -->

    <meta name="theme-color" content="#c8f135" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <div id="root"></div>
